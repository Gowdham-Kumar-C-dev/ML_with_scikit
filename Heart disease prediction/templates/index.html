<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #eef3ff;
            text-align: center;
        }
        .container {
            width: 450px;
            margin: auto;
            padding: 25px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 0 10px #777;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            text-align: left;
        }
        input, select {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #777;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #004c99;
        }
        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Heart Disease Prediction</h2>

    <label>Age</label>
    <input id="Age" type="number">

    <label>Gender</label>
    <select id="Gender">
        <option value="1">Male</option>
        <option value="0">Female</option>
    </select>

    <label>Weight (kg)</label>
    <input id="Weight" type="number">

    <label>Height (cm)</label>
    <input id="Height" type="number">

    <label>BMI</label>
    <input id="BMI" type="number" step="0.1">

    <label>Smoking</label>
    <select id="Smoking">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select>

    <label>Alcohol_Intake</label>
    <select id="Alcohol_Intake">
        <option value="0">No</option>
        <option value="1">Occasionally</option>
        <option value="2">Frequently</option>
    </select>

    <label>Physical_Activity</label>
    <select id="Physical_Activity">
        <option value="0">Low</option>
        <option value="1">Moderate</option>
        <option value="2">High</option>
    </select>

    <label>Diet</label>
    <select id="Diet">
        <option value="0">Unhealthy</option>
        <option value="1">Balanced</option>
        <option value="2">Healthy</option>
    </select>

    <label>Stress_Level</label>
    <select id="Stress_Level">
        <option value="0">Low</option>
        <option value="1">Moderate</option>
        <option value="2">High</option>
    </select>

    <label>Hypertension</label>
    <select id="Hypertension">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select>

    <label>Diabetes</label>
    <select id="Diabetes">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select>

    <label>Hyperlipidemia</label>
    <select id="Hyperlipidemia">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select>

    <label>Family_History</label>
    <select id="Family_History">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select>

    <label>Previous_Heart_Attack</label>
    <select id="Previous_Heart_Attack">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select>

    <label>Systolic_BP</label>
    <input id="Systolic_BP" type="number">

    <label>Diastolic_BP</label>
    <input id="Diastolic_BP" type="number">

    <label>Heart_Rate</label>
    <input id="Heart_Rate" type="number">

    <label>Blood_Sugar_Fasting</label>
    <input id="Blood_Sugar_Fasting" type="number">

    <label>Cholesterol_Total</label>
    <input id="Cholesterol_Total" type="number">

    <button onclick="predict()">Predict</button>

    <div id="result"></div>

</div>

<script>
async function predict() {
    const data = {
        Age: parseFloat(document.getElementById("Age").value),
        Gender: parseFloat(document.getElementById("Gender").value),
        Weight: parseFloat(document.getElementById("Weight").value),
        Height: parseFloat(document.getElementById("Height").value),
        BMI: parseFloat(document.getElementById("BMI").value),
        Smoking: parseFloat(document.getElementById("Smoking").value),
        Alcohol_Intake: parseFloat(document.getElementById("Alcohol_Intake").value),
        Physical_Activity: parseFloat(document.getElementById("Physical_Activity").value),
        Diet: parseFloat(document.getElementById("Diet").value),
        Stress_Level: parseFloat(document.getElementById("Stress_Level").value),
        Hypertension: parseFloat(document.getElementById("Hypertension").value),
        Diabetes: parseFloat(document.getElementById("Diabetes").value),
        Hyperlipidemia: parseFloat(document.getElementById("Hyperlipidemia").value),
        Family_History: parseFloat(document.getElementById("Family_History").value),
        Previous_Heart_Attack: parseFloat(document.getElementById("Previous_Heart_Attack").value),
        Systolic_BP: parseFloat(document.getElementById("Systolic_BP").value),
        Diastolic_BP: parseFloat(document.getElementById("Diastolic_BP").value),
        Heart_Rate: parseFloat(document.getElementById("Heart_Rate").value),
        Blood_Sugar_Fasting: parseFloat(document.getElementById("Blood_Sugar_Fasting").value),
        Cholesterol_Total: parseFloat(document.getElementById("Cholesterol_Total").value)
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    document.getElementById("result").innerText = result.prediction;
}
</script>

</body>
</html>
